<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Soowigs Admin — Dashboard</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="css/admin.css" />
</head>

<body>
    <!-- Simple Admin Branding -->
    <div id="adminApp" class="admin-app">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <span style="color:#9D306C">Soo</span><span style="color:#E79AB3">Wigs</span> Admin
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="active">📊 Dashboard</a>
                <a href="#">💎 Products</a>
                <a href="#">📦 Orders</a>
                <a href="#">👥 Customers</a>
                <a href="#">⚙️ Settings</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div class="topbar-title">Dashboard Overview</div>
                <div class="admin-profile">Admin</div>
            </header>

            <section class="page dashboard">
                <div class="kpi-grid">
                    <div class="kpi-card">
                        <small>Revenue</small>
                        <h2>4,500,000 FCFA</h2>
                    </div>
                    <div class="kpi-card">
                        <small>Orders</small>
                        <h2>124</h2>
                    </div>
                    <div class="kpi-card">
                        <small>Customers</small>
                        <h2>892</h2>
                    </div>
                </div>

                <div class="chart-section">
                    <canvas id="revenueChart"></canvas>
                </div>
            </section>
        </main>
    </div>

    <style>
        :root {
            --admin-primary: #9D306C;
            --admin-bg: #f5f6f9;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--admin-bg);
            margin: 0;
        }

        .admin-app {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 250px;
            background: #fff;
            border-right: 1px solid #ddd;
            padding: 20px;
        }

        .sidebar-logo {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 40px;
        }

        .sidebar-nav a {
            display: block;
            padding: 12px;
            color: #444;
            text-decoration: none;
            margin-bottom: 5px;
            border-radius: 5px;
        }

        .sidebar-nav a.active {
            background: var(--admin-primary);
            color: #fff;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .topbar {
            background: #fff;
            padding: 20px;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
        }

        .page {
            padding: 30px;
        }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .kpi-card {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .kpi-card h2 {
            color: var(--admin-primary);
            margin: 5px 0 0;
        }

        .chart-section {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
        }
    </style>

    <script>
        const ctx = document.getElementById('revenueChart');
        if (ctx) {
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                    datasets: [{
                        label: 'Revenue (FCFA)',
                        data: [1200000, 1900000, 3000000, 2500000, 4200000, 4500000],
                        borderColor: '#9D306C',
                        backgroundColor: 'rgba(157, 48, 108, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                }
            });
        }
    </script>
</body>

</html>
