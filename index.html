<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TorodoAvenue - La Collection Bal de Promo 2026</title>
    <meta name="description" content="Découvrez notre collection exclusive de robes de soirée. Conçu pour votre moment de grandeur.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Promo Banner -->
    <div class="promo-banner">
        <p>LA COLLECTION BAL DE PROMO 2026 EST LÀ ✨</p>
    </div>

    <!-- Header -->
    <header class="navbar">
        <div class="nav-left">
            <button aria-label="Menu"><i class="ri-menu-line"></i></button>
            <button aria-label="Recherche"><i class="ri-search-line"></i></button>
        </div>
        
        <div class="nav-center">
            <h1 class="logo">TorodoAvenue</h1>
        </div>
        
        <div class="nav-right">
            <button aria-label="Panier"><i class="ri-shopping-bag-line"></i></button>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h2>CONÇU POUR VOTRE MOMENT DE GRANDEUR</h2>
            <a href="#shop" class="btn-shop">ACHETER MAINTENANT</a>
        </div>
    </section>

    <!-- Floating Chat -->
    <div class="floating-chat">
        <div class="chat-badge">1</div>
        <button aria-label="Chat"><i class="ri-chat-3-fill"></i></button>
    </div>

    <script src="script.js"></script>
</body>
</html>
